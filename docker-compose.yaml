version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: card-application-oris
      POSTGRES_USER: card-application
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app:
    build: .
    ports:
      - "8085:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/card-application-oris
      - DB_USER=postgres
      - DB_PASSWORD=12345
    depends_on:
      - postgres
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: